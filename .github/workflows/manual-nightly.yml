name: Manual Nightly Release

on:
  workflow_dispatch:
    inputs:
      use-python-luthier:
        description: "Use the Python version of Luthier"
        required: false
        default: false
        type: boolean

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: lute-linux-x86_64
            options: --c-compiler clang --cxx-compiler clang++
          - os: ubuntu-24.04-arm
            artifact_name: lute-linux-aarch64
            options: --c-compiler clang --cxx-compiler clang++
          - os: macos-latest
            artifact_name: lute-macos-aarch64
          - os: windows-latest
            artifact_name: lute-windows-x86_64
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup and Build Lute
      id: build_lute
      uses: ./.github/actions/setup-and-build
      with:
        target: Lute.CLI
        config: release
        options: ${{ matrix.options }}
        token: ${{ secrets.GITHUB_TOKEN }}
        use-python-luthier: ${{ github.event.inputs.use-python-luthier }}
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        path: ${{ steps.build_lute.outputs.exe_path }}
        name: ${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: get_version.cmake

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - run: |
          mkdir release
          for dir in ./artifacts/*; do
            base_name=$(basename "$dir")
            zip -rj release/"${base_name}.zip" "$dir"/*
          done

      - name: Get project version
        id: get_version
        run: |
          VERSION=$(cmake -P get_version.cmake 2>&1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Nightly Tag
        id: tag_step
        run: |
          DATE=$(date +%Y%m%d)
          TAG="-nightly.$DATE"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create Nightly Tag
        id: tag_release
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          NIGHTLY_TAG=${{ steps.tag_step.outputs.tag }}
          RELEASE_TAG="$VERSION$NIGHTLY_TAG"
          echo "tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
