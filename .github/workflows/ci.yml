name: Gated Commits

on:
  push:
    branches: ["primary"]
  pull_request:
    branches: ["primary"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: windows-latest
            options: --c-compiler cl.exe --cxx-compiler cl.exe
          - os: ubuntu-latest
            options: --c-compiler gcc --cxx-compiler g++
          - os: ubuntu-latest
            options: --c-compiler clang --cxx-compiler clang++
          - os: macos-latest
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup and Build Lute
        uses: ./.github/actions/setup-and-build
        with:
          target: Lute.CLI
          config: debug
          options: ${{ matrix.options }}
          token: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: windows-latest
            options: --c-compiler cl.exe --cxx-compiler cl.exe
          - os: ubuntu-latest
            options: --c-compiler gcc --cxx-compiler g++
          - os: ubuntu-latest
            options: --c-compiler clang --cxx-compiler clang++
          - os: macos-latest
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup and Build C++ Unit Tests
        id: build_tests
        uses: ./.github/actions/setup-and-build
        with:
          target: Lute.Test
          config: debug
          options: ${{ matrix.options }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Remove .luaurc file
        run: rm .luaurc

      - name: Run Tests
        run: ${{ steps.build_tests.outputs.exe_path }}

  luau-lute-test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: windows-latest
            options: --c-compiler cl.exe --cxx-compiler cl.exe
          - os: ubuntu-latest
            options: --c-compiler gcc --cxx-compiler g++
          - os: ubuntu-latest
            options: --c-compiler clang --cxx-compiler clang++
          - os: macos-latest
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Luau - Lute Unit Tests
        id: build_tests
        uses: ./.github/actions/setup-and-build
        with:
          target: Lute.CLI
          config: debug
          options: ${{ matrix.options }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Remove .luaurc file
        run: rm .luaurc

      - name: Run Tests
        run: find tests -name "*.test.luau" | xargs -I {} ${{ steps.build_tests.outputs.exe_path }} run {}


  check-format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        uses: Roblox/setup-foreman@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          allow-external-github-orgs: true

      - name: Run StyLua
        run: stylua --check .

  aggregator:
    name: Gated Commits
    runs-on: ubuntu-latest
    needs: [build, test, luau-lute-test, check-format]
    if: ${{ always() }}
    steps:
      - name: Aggregator
        run: |
          if [ "${{ needs.build.result }}" == "success" ] && [ "${{ needs.test.result }}" == "success" ] && [ "${{ needs.check-format.result }}" == "success" ]; then
            echo "All jobs succeeded"
          else
            echo "One or more jobs failed"
            exit 1
          fi
