name: CI

on:
  push:
    branches: ["primary"]
  pull_request:
    branches: ["primary"]

# CI on the "primary" branch opts out of concurrency grouping by using the run's
# unique run_id.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/primary' && github.run_id || github.ref }}
  cancel-in-progress: true

jobs:
  run-lutecli-luau-tests:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      matrix:
        include:
          - os: windows-latest
            options: --c-compiler cl.exe --cxx-compiler cl.exe
          - os: ubuntu-latest
            options: --c-compiler gcc --cxx-compiler g++ --enable-sanitizers
          - os: ubuntu-latest
            options: --c-compiler clang --cxx-compiler clang++ --enable-sanitizers
          - os: macos-latest
            options: --enable-sanitizers
          - os: ubuntu-latest
            options: --c-compiler gcc --cxx-compiler g++ --enable-sanitizers
            use-bootstrap: true
          - os: ubuntu-latest
            options: --c-compiler clang --cxx-compiler clang++ --enable-sanitizers
            use-bootstrap: true
      fail-fast: false

    steps:
      # Non-bootstrap jobs always run; all jobs run on pushes to primary branch.
      - name: Determine if this matrix job should run
        id: should_run
        run: |
          if [[ "${{ matrix.use-bootstrap }}" != "true" ]] || { [[ "${{ github.event_name }}" == "push" ]] && [[ "${{ github.ref }}" == "refs/heads/primary" ]]; }; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4

      - name: Setup and Build Lute
        id: build_lute
        if: ${{ steps.should_run.outputs.proceed == 'true' }}
        uses: ./.github/actions/setup-and-build
        with:
          target: Lute.CLI
          config: debug
          options: ${{ matrix.options }}
          token: ${{ secrets.GITHUB_TOKEN }}
          use-bootstrap: ${{ matrix.use-bootstrap || 'false' }}

      - name: Use CI .luaurc file
        if: ${{ steps.should_run.outputs.proceed == 'true' }}
        run: rm .luaurc && mv .luaurc.ci .luaurc

      - name: Run Luau Tests (POSIX)
        if: ${{ steps.should_run.outputs.proceed == 'true' }}
        run: ${{ steps.build_lute.outputs.exe_path }} test

  run-lute-cxx-unittests:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: windows-latest
            options: --c-compiler cl.exe --cxx-compiler cl.exe
          - os: ubuntu-latest
            options: --c-compiler gcc --cxx-compiler g++ --enable-sanitizers
          - os: ubuntu-latest
            options: --c-compiler clang --cxx-compiler clang++ --enable-sanitizers
          - os: macos-latest
            options: --enable-sanitizers
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup and Build C++ Unit Tests
        id: build_tests
        uses: ./.github/actions/setup-and-build
        with:
          target: Lute.Test
          config: debug
          options: ${{ matrix.options }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Remove .luaurc file
        run: rm .luaurc

      - name: Run C++ Tests
        run: ${{ steps.build_tests.outputs.exe_path }}

  check-format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        uses: Roblox/setup-foreman@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          allow-external-github-orgs: true

      - name: Run StyLua
        run: stylua --check .

  build-docs-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup and Build Lute
        id: build_lute
        uses: ./.github/actions/setup-and-build
        with:
          target: Lute.CLI
          config: debug
          options: ${{ matrix.options }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4

      - name: Install dependencies
        run: npm install
        working-directory: docs

      - name: Build docs site
        run: |
          export PATH="$(dirname '${{ steps.build_lute.outputs.exe_path }}'):$PATH"
          npm run build
        working-directory: docs

      - name: Upload docs artifact
        id: deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist/

  lute-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup and Build Lute
        id: build_lute
        uses: ./.github/actions/setup-and-build
        with:
          target: Lute.CLI
          config: debug
          options: ${{ matrix.options }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Lute Lint
        run: ${{ steps.build_lute.outputs.exe_path }} lint -v .

  lute-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup and Build Lute
        id: build_lute
        uses: ./.github/actions/setup-and-build
        with:
          target: Lute.CLI
          config: debug
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Lute Check
        run: ${{ steps.build_lute.outputs.exe_path }} tools/check.luau ${{ steps.build_lute.outputs.exe_path }}

  aggregator:
    name: Gated Commits
    runs-on: ubuntu-latest
    needs: [run-lutecli-luau-tests, run-lute-cxx-unittests, check-format, build-docs-site, lute-lint, lute-check]
    if: ${{ always() }}
    steps:
      - name: Aggregator
        id: aggregator
        run: |
          if [ "${{ needs.run-lutecli-luau-tests.result }}" == "success" ] && [ "${{ needs.run-lute-cxx-unittests.result }}" == "success" ] && [ "${{ needs.check-format.result }}" == "success" ] && [ "${{ needs.build-docs-site.result }}" == "success" ] && [ "${{ needs.lute-lint.result }}" == "success" ] && [ "${{ needs.lute-check.result }}" == "success" ]; then
            echo "All jobs succeeded"
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "One or more jobs failed"
            echo "result=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi
      - name: Post-aggregation notification
        if: >
          always() &&
          github.event_name == 'pull_request' &&
          github.ref == 'refs/heads/vrn-sn/fix-slow-ci-builds'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          LAST_STATUS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/luau-lang/lute/actions/workflows/ci.yml/runs?branch=primary&status=completed&per_page=1" \
            | jq -r '.workflow_runs[0].conclusion')

          TEXT=""
          if [[ "$LAST_STATUS" == "success" ]] && [[ "${{ steps.aggregator.outputs.result }}" == "failure" ]]; then
            TEXT=":rotating_light: *Lute CI has started failing*"
          elif [[ "$LAST_STATUS" == "failure" ]] && [[ "${{ steps.aggregator.outputs.result }}" == "success" ]]; then
            TEXT=":white_check_mark: *Lute CI is passing again*"
          fi

          if [[ -z "$TEXT" ]]; then
            echo "No status change detected. Skipping notification."
            exit 0
          fi

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -sS -o /dev/null -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "{
              \"channel\": \"C0ACG5DGAG0\",
              \"text\": \"$TEXT (<$RUN_URL|view workflow run>)\"
            }"
