name: "Setup and Build Lute"
description: "Install dependencies, configure and build Lute"

inputs:
  config:
    description: "Build configuration (debug or release)"
    required: false
    default: "debug"
  options:
    description: "Configure options"
    required: true
  token:
    description: "Token for foreman"
    required: true

outputs:
  exe_path:
    description: "Path to the compiled executable"
    value: ${{ steps.artifact_path.outputs.exe_path }}

runs:
  using: "composite"
  steps:
    - name: Install tools
      uses: Roblox/setup-foreman@v3
      with:
        token: ${{ inputs.token }}
        allow-external-github-orgs: true

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build clang cmake

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew update
        brew unlink brotli zstd
        brew install cmake

    - name: Set up MSVC
      if: runner.os == 'Windows'
      uses: luau-lang/msvc-dev-cmd@v1

    - name: Set up NASM
      if: runner.os == 'Windows'
      uses: luau-lang/setup-nasm@v1
  
    - name: Create build directory
      shell: bash
      run: mkdir -p build

    - name: Configure Lute
      shell: bash
      run: |
        BUILD_TYPE=$(echo "${{ inputs.config }}" | tr '[:lower:]' '[:upper:]')
        cmake -B build -S . -DCMAKE_BUILD_TYPE=$BUILD_TYPE ${{ inputs.options }}

    - name: Build Lute
      shell: bash
      run: |
        BUILD_TYPE=$(echo "${{ inputs.config }}" | tr '[:lower:]' '[:upper:]')
        cmake --build build --config $BUILD_TYPE

    - name: Get Artifact Path
      id: artifact_path
      shell: bash
      run: |
        if [ "${{ runner.os }}" == "Windows" ]; then
          BUILD_TYPE=$(echo "${{ inputs.config }}" | tr '[:lower:]' '[:upper:]')
          exe_path="build/$BUILD_TYPE/cli/lute.exe"
        else
          exe_path="build/cli/lute"
        fi
        echo "Executable path: $exe_path"  # Debug print
        echo "exe_path=$exe_path" >> "$GITHUB_OUTPUT"