name: "Setup and Build"
description: "Install dependencies, configure and build target"

inputs:
  target:
    description: "Which target to build"
    required: true
  config:
    description: "Build configuration (debug or release)"
    required: false
    default: "debug"
  options:
    description: "Additional luthier options"
    required: false
    default: ""
  token:
    description: "Token for foreman"
    required: true
  use-bootstrap:
    description: "Whether to use the bootstrap script to build the Lute used to run luthier"
    required: false
    default: "false"
  install-system-deps:
    description: "Whether to install system build dependencies via apt-get. Set to 'false' when the caller provisions its own toolchain (e.g. inside a custom container)."
    required: false
    default: "true"
  musl-target:
    description: "If set (e.g. 'x86_64-linux-musl'), build the final lute binary against musl libc using zig as the cross compiler. Implies --static-cxx-runtime. Linux only."
    required: false
    default: ""

outputs:
  exe_path:
    description: "Path to the compiled executable"
    value: ${{ steps.artifact_path.outputs.exe_path }}

runs:
  using: "composite"
  steps:
    - name: Install tools
      if: ${{ inputs.use-bootstrap == 'false' }}
      uses: Roblox/setup-foreman@v3
      with:
        token: ${{ inputs.token }}
        allow-external-github-orgs: true

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux' && inputs.install-system-deps == 'true'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build clang

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew update
        brew unlink brotli zstd

    - name: Set up MSVC
      if: runner.os == 'Windows'
      uses: luau-lang/msvc-dev-cmd@v1

    - name: Set up NASM
      if: runner.os == 'Windows'
      uses: luau-lang/setup-nasm@v1

    - name: Set up Zig (musl cross toolchain)
      if: ${{ inputs.musl-target != '' }}
      uses: mlugg/setup-zig@v2

    - name: Create musl compiler wrappers
      if: ${{ inputs.musl-target != '' }}
      shell: bash
      run: |
        set -euo pipefail
        wrappers="$RUNNER_TEMP/lute-musl"
        mkdir -p "$wrappers"
        cat > "$wrappers/cc" <<EOF
        #!/bin/sh
        exec zig cc -target ${{ inputs.musl-target }} "\$@"
        EOF
        cat > "$wrappers/c++" <<EOF
        #!/bin/sh
        exec zig c++ -target ${{ inputs.musl-target }} "\$@"
        EOF
        chmod +x "$wrappers/cc" "$wrappers/c++"
        # Expose the resolved paths to subsequent steps; we deliberately don't
        # set CC/CXX in the global env so the bootstrap step keeps using the
        # host (glibc) toolchain.
        echo "LUTE_MUSL_CC=$wrappers/cc" >> "$GITHUB_ENV"
        echo "LUTE_MUSL_CXX=$wrappers/c++" >> "$GITHUB_ENV"

    - name: Cache extern folder
      uses: actions/cache@v4
      id: cache-extern
      with:
        path: extern
        key: extern-${{ hashFiles('extern/*.tune') }}

    - name: Bootstrap Lute (if needed) and set LUTE
      shell: bash
      run: |
        if [[ "${{ inputs.use-bootstrap }}" == "true" ]]; then
          echo "Bootstrapping Lute..."
          ./tools/bootstrap.sh
          echo "LUTE=./build/lute0" >> $GITHUB_ENV
        else
          echo "LUTE=lute" >> $GITHUB_ENV
        fi

    - name: Compute luthier options
      id: luthier_options
      shell: bash
      run: |
        opts='${{ inputs.options }}'
        if [[ -n "${{ inputs.musl-target }}" ]]; then
          opts="$opts --c-compiler $LUTE_MUSL_CC --cxx-compiler $LUTE_MUSL_CXX --static-cxx-runtime"
        fi
        echo "options=$opts" >> "$GITHUB_OUTPUT"

    - name: Fetch ${{ inputs.target }}
      if: steps.cache-extern.outputs.cache-hit != 'true'
      shell: bash
      run: $LUTE ./tools/luthier.luau fetch ${{ inputs.target }}

    - name: Configure ${{ inputs.target }}
      shell: bash
      run: $LUTE ./tools/luthier.luau configure ${{ inputs.target }} --config ${{ inputs.config }} ${{ steps.luthier_options.outputs.options }}

    - name: Build ${{ inputs.target }}
      shell: bash
      run: $LUTE ./tools/luthier.luau build ${{ inputs.target }} --config ${{ inputs.config }} ${{ steps.luthier_options.outputs.options }}

    - name: Get Artifact Path
      id: artifact_path
      shell: bash
      run: |
        exe_path=$($LUTE ./tools/luthier.luau build ${{ inputs.target }} --config ${{ inputs.config }} --which)
        echo "Executable path: $exe_path"  # Debug print
        echo "exe_path=$exe_path" >> "$GITHUB_OUTPUT"
